<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #F8F4EF;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Left accent bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    width: 8px;
    height: 100%;
    background: linear-gradient(180deg, #2D4A40 0%, #B8924A 100%);
  }

  /* Subtle bg texture */
  .bg-circle {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(ellipse, rgba(45,74,64,0.04) 0%, transparent 70%);
    border-radius: 50%;
  }

  .inner {
    position: relative;
    z-index: 10;
    padding: 72px 80px 72px 92px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Top */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    color: #2D4A40;
    letter-spacing: 0.04em;
  }
  .logo span { color: #B8924A; }
  .verified-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(45,74,64,0.07);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #2D4A40;
  }

  /* Quote area */
  .quote-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 0;
  }

  .stars {
    font-size: 36px;
    color: #B8924A;
    letter-spacing: 4px;
    margin-bottom: 36px;
  }

  .open-quote {
    font-family: 'Playfair Display', serif;
    font-size: 160px;
    line-height: 0.5;
    color: #2D4A40;
    opacity: 0.08;
    display: block;
    margin-bottom: 0;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.25;
    color: #1A2A24;
    letter-spacing: -0.01em;
    margin-bottom: 44px;
    position: relative;
    z-index: 2;
  }
  .quote-text em {
    font-style: normal;
    color: #2D4A40;
    font-weight: 500;
    border-bottom: 2px solid #B8924A;
  }

  /* Reviewer */
  .reviewer {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .reviewer-avatar {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #4E7A69, #2D4A40);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }
  .reviewer-info {}
  .reviewer-name {
    font-size: 17px;
    font-weight: 600;
    color: #2D4A40;
    margin-bottom: 3px;
  }
  .reviewer-meta {
    font-size: 13px;
    color: #8A8580;
  }
  .reviewer-meta span { color: #2D4A40; font-weight: 500; }

  /* Bottom */
  .bottom {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .trust-pill {
    background: #2D4A40;
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 500;
    padding: 14px 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .trust-icon { font-size: 18px; }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="bg-circle"></div>

<div class="inner">
  <div class="top">
    <div class="logo">La<span>Lume</span></div>
    <div class="verified-badge">✓ Verified Customer</div>
  </div>

  <div class="quote-area">
    <div class="stars">★★★★★</div>
    <span class="open-quote">"</span>
    <div class="quote-text">
      "My dermatologist <em>noticed my skin texture improvement</em> before I even mentioned the new serum. That says everything."
    </div>
    <div class="reviewer">
      <div class="reviewer-avatar">👩</div>
      <div class="reviewer-info">
        <div class="reviewer-name">Margot W.</div>
        <div class="reviewer-meta">Victoria, BC &nbsp;·&nbsp; <span>Copper Peptide Renewal Serum</span> &nbsp;·&nbsp; 6 weeks in</div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="trust-pill"><span class="trust-icon">🛡️</span>30-Day Guarantee</div>
    <div class="trust-pill"><span class="trust-icon">✈️</span>Free Shipping CA & US</div>
    <div class="trust-pill"><span class="trust-icon">🔬</span>Clinical Formula</div>
  </div>
</div>
</body>
</html>
